version: 1
frontend:
    phases:
        preBuild:
            commands:
                - nvm install 24
                - nvm use 24
                - npm install -g npm@latest
                - npm install --no-audit --no-fund --cache .npm --legacy-peer-deps || (cat .npm/_logs/*.log && exit 1)
                - export NODE_OPTIONS="--max-old-space-size=32768"
        build:
            commands:
                - echo "========================================"
                - echo "TEST 1: Normal build (baseline)"
                - echo "========================================"
                - NG_BUILD_DEBUG_PERF=1 npx ng build --configuration production 2>&1 && echo "TEST1_RESULT=SUCCESS" || echo "TEST1_RESULT=FAILED"
                - echo ""
                - echo "========================================"
                - echo "TEST 2: NG_BUILD_MAX_WORKERS=1"
                - echo "========================================"
                - NG_BUILD_MAX_WORKERS=1 NG_BUILD_DEBUG_PERF=1 npx ng build --configuration production 2>&1 && echo "TEST2_RESULT=SUCCESS" || echo "TEST2_RESULT=FAILED"
                - echo ""
                - echo "========================================"
                - echo "TEST 3: NG_BUILD_PARALLEL_TS=0"
                - echo "========================================"
                - NG_BUILD_PARALLEL_TS=0 NG_BUILD_DEBUG_PERF=1 npx ng build --configuration production 2>&1 && echo "TEST3_RESULT=SUCCESS" || echo "TEST3_RESULT=FAILED"
                - echo ""
                - echo "========================================"
                - echo "TEST 4: Build with styles removed (no CSS)"
                - echo "========================================"
                - node -e "const f=require('fs');const c=JSON.parse(f.readFileSync('angular.json','utf8'));c.projects['repro-app'].architect.build.options.styles=[];f.writeFileSync('angular.json',JSON.stringify(c,null,2))"
                - NG_BUILD_DEBUG_PERF=1 npx ng build --configuration production 2>&1 && echo "TEST4_RESULT=SUCCESS" || echo "TEST4_RESULT=FAILED"
                - echo ""
                - echo "========================================"
                - echo "ALL TESTS COMPLETE"
                - echo "========================================"
    artifacts:
        baseDirectory: dist/browser
        files:
            - '**/*'
    cache:
        paths:
            - .npm/**/*
