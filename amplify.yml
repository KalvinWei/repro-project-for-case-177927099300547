version: 1
frontend:
    phases:
        preBuild:
            commands:
                - nvm install 24
                - nvm use 24
                - npm install -g npm@latest
                - npm install --no-audit --no-fund --cache .npm --legacy-peer-deps || (cat .npm/_logs/*.log && exit 1)
                - export NODE_OPTIONS="--max-old-space-size=32768"
        build:
            commands:
                - node scripts/verify-env-vars.js
    artifacts:
        baseDirectory: dist/browser
        files:
            - '**/*'
    cache:
        paths:
            - .npm/**/*
